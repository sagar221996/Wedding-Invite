<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  background: linear-gradient(to right, #fff1f2, #ffe4e6);
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Center button */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Ribbon button */
.ribbon-btn {
  background: #d6336c;
  color: white;
  padding: 18px 35px;
  font-size: 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.ribbon-btn:hover {
  transform: scale(1.05);
}

/* Fullscreen overlay */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.8s ease;
}

/* Show overlay */
.overlay.show {
  opacity: 1;
  visibility: visible;
}

/* Invitation image */
.invite-img {
  width: 90%;
  max-width: 500px;
  border-radius: 15px;
  transform: scale(0.7);
  opacity: 0;
  transition: all 1s ease;
}

/* Animation when opened */
.overlay.show .invite-img {
  transform: scale(1);
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">
  <button class="ribbon-btn" onclick="openInvite()">🎀 Open Invitation</button>
</div>

<div id="overlay" class="overlay">
  <img src="invitation.jpg" class="invite-img" alt="Wedding Invitation">
</div>

<script>
function openInvite() {
  document.getElementById("overlay").classList.add("show");
}
</script>

</body>
</html>
