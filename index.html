<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #fff1f2, #ffe4e6);
  overflow-x: hidden;
}

/* Center container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Ribbon button */
.ribbon-btn {
  background: #d6336c;
  color: white;
  padding: 20px 40px;
  font-size: 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  position: relative;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.ribbon-btn:hover {
  transform: scale(1.05);
}

/* Invitation card */
.card {
  width: 90%;
  max-width: 600px;
  height: 80vh;
  background: white;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scaleY(0);
  transform-origin: top;
  border-radius: 15px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  overflow-y: auto;
  transition: transform 1s ease;
}

/* Open animation */
.card.open {
  transform: translate(-50%, -50%) scaleY(1);
}

/* Content styling */
.content {
  padding: 30px;
  text-align: center;
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  color: #d6336c;
}

h2 {
  margin-top: 10px;
  font-weight: normal;
}

.section {
  margin: 30px 0;
}

.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">
  <button class="ribbon-btn" onclick="openCard()">🎀 Open Invitation</button>
</div>

<div id="card" class="card">
  <div class="content">
    <h1 class="fade-in">You're Invited</h1>
    <h2 class="fade-in" style="animation-delay:0.3s;">
      Sagar ❤️ Sumitra
    </h2>

    <div class="section fade-in" style="animation-delay:0.6s;">
      <p><strong>Date:</strong> 10 December 2026</p>
      <p><strong>Venue:</strong> Hyderabad</p>
    </div>

    <div class="section fade-in" style="animation-delay:0.9s;">
      <p>Join us to celebrate love, laughter and happily ever after 💍</p>
    </div>
  </div>
</div>

<script>
function openCard() {
  document.getElementById("card").classList.add("open");
}
</script>

</body>
</html>
